# Training preset for transformer-family ReID models
#
# Covers: csl_tinyvit_7m, csl_tinyvit_11m, csl_tinyvit_23m,
#         and their LMBN-style variants.
#
# The trainer auto-tunes several settings from the backbone's transformer recipe
# (AdamW, layer-decay LR, soft-margin triplet, grad clip).  This recipe
# sets the remaining hyper-parameters to their optimal transformer values so
# the full configuration is explicit and documented in one place.
#
# Usage:
#   uv run python -m boxmot.engine.cli train \
#     --recipe vit \
#     --model csl_tinyvit_7m \
#     --data-dir ./Market-1501-v15.09.15 \
#     --device mps

model: csl_tinyvit_11m
loss: triplet
epochs: 250
lr: 0.0005
weight_decay: 0.05
batch_size: 64
imgsz: [384, 128]
warmup_epochs: 10
backbone_freeze_epochs: 10
gradual_unfreeze: false
gradual_unfreeze_head_epochs: 0
gradual_unfreeze_stage_epochs: 0
gradual_unfreeze_backbone_lr_mult: 1.0
gradual_unfreeze_backbone_lr_epochs: 0
margin: 0.3
label_smooth: 0.05
center_loss_weight: 0.005
ema_decay: 0.999
color_jitter: true
gaussian_blur: true
random_grayscale: 0.1
preprocess: resize
